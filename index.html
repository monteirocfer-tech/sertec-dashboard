<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard SER+TEC 2026</title>

<!-- Tailwind CDN -->

<script src="https://cdn.tailwindcss.com"></script>

<!-- Ícones -->

<script src="https://unpkg.com/lucide@latest"></script>

<!-- PapaParse para leitura de CSV -->

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

</head>

<body class="bg-gray-100">

<div id="app">

<h1 class="text-3xl font-bold text-center mt-10">Dashboard SER+TEC 2026</h1>

<div class="max-w-6xl mx-auto mt-10 bg-white p-6 rounded shadow">

<div class="flex gap-4 mb-6">

<input id="fileInput"
type="file"
accept=".csv"
class="border p-2 rounded"/>

<button id="loadExample"
class="bg-pink-600 text-white px-4 py-2 rounded">
Carregar Base Padrão </button>

</div>

<table class="w-full border text-sm" id="dataTable">

<thead class="bg-gray-100">
<tr>
<th class="p-2 border">ID</th>
<th class="p-2 border">Unidade</th>
<th class="p-2 border">Área</th>
<th class="p-2 border">Treinamento</th>
<th class="p-2 border">Tipo</th>
<th class="p-2 border">Mês</th>
<th class="p-2 border">Dias</th>
<th class="p-2 border">Status</th>
<th class="p-2 border">Presentes</th>
<th class="p-2 border">Horas</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

<script>

const tableBody = document.querySelector("#dataTable tbody")

const CSV_CONFIG = {
header:true,
skipEmptyLines:true,
delimiter:"",
transformHeader:(header)=>header.replace(/^\uFEFF/,"").trim()
}

function renderRows(rows){

tableBody.innerHTML = ""

rows.forEach(r => {

const tr = document.createElement("tr")

tr.innerHTML = `
<td class="border p-2">${r.ID || ""}</td>
<td class="border p-2">${r["Unidade"] || ""}</td>
<td class="border p-2">${r["Área"] || ""}</td>
<td class="border p-2">${r["Nome do Treinamento"] || ""}</td>
<td class="border p-2">${r["Tipo"] || ""}</td>
<td class="border p-2">${r["Mês"] || ""}</td>
<td class="border p-2">${r["Dias"] || ""}</td>
<td class="border p-2">${r["Status"] || ""}</td>
<td class="border p-2">${r["Presentes"] || ""}</td>
<td class="border p-2">${r["Horas"] || ""}</td>
`

tableBody.appendChild(tr)

})

}

function parseCSV(file){

Papa.parse(file,{
...CSV_CONFIG,
complete:function(result){

renderRows(result.data)

}
})

}

document
.getElementById("fileInput")
.addEventListener("change",e=>{

const file = e.target.files[0]

if(file){
parseCSV(file)
}

})

document
.getElementById("loadExample")
.addEventListener("click",()=>{

fetch("template_sertec_2026.csv")
.then(r=>r.text())
.then(text=>{

Papa.parse(text,{
...CSV_CONFIG,
complete:function(result){

renderRows(result.data)

}
})

})

})

</script>

</body>
</html>
